name: mystic_chat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ✅ Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_database: ^12.2.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^17.2.2

  # ✅ Media
  image_picker: ^1.1.2
  device_preview: ^1.2.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.5.1
  cupertino_icons: ^1.0.8
  image_cropper: ^9.1.0
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  video_player: ^2.9.2

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ✅ Voice
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  scrollable_positioned_list: ^0.3.8
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/ui/MysticMeowsengerIcon.png
  remove_alpha_ios: true


flutter:
  uses-material-design: true

